name: Update GitHub Stats

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download GitHub stats SVGs
        run: |
          set -e

          echo "Baixando top-langs.svg..."
          curl -fLsS "https://github-readme-stats.vercel.app/api/top-langs/?username=acvb-Alexsander&layout=compact&theme=tokyonight&hide_border=true&langs_count=8" \
            -o assets/top-langs.svg

          echo "Baixando github-stats.svg..."
          curl -fLsS "https://github-readme-stats.vercel.app/api?username=acvb-Alexsander&show_icons=true&theme=tokyonight&hide_border=true" \
            -o assets/github-stats.svg

      - name: Validate downloaded SVGs
        run: |
          for file in assets/top-langs.svg assets/github-stats.svg; do
            if [ ! -s "$file" ]; then
              echo "ERRO: $file está vazio ou não foi criado."
              exit 1
            fi
            if ! grep -q "<svg" "$file"; then
              echo "ERRO: $file não contém um SVG válido (provável rate limit ou erro da API)."
              cat "$file"
              exit 1
            fi
            echo "$file OK ($(wc -c < "$file") bytes)"
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg

          if git diff --cached --quiet; then
            echo "Nenhuma mudança para commitar."
            exit 0
          fi

          git commit -m "Update GitHub stats cards"
          git push
