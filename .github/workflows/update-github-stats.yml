name: Update GitHub Stats

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=acvb-Alexsander&show_icons=true&theme=tokyonight&hide_border=true
          path: assets/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=acvb-Alexsander&layout=compact&theme=tokyonight&hide_border=true&langs_count=8
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate generated SVGs
        run: |
          for file in assets/top-langs.svg assets/github-stats.svg; do
            if [ ! -s "$file" ] || ! grep -q "<svg" "$file"; then
              echo "ERRO: $file não foi gerado corretamente."
              exit 1
            fi
            echo "$file OK ($(wc -c < "$file") bytes)"
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if git diff --cached --quiet; then
            echo "Nenhuma mudança para commitar."
            exit 0
          fi
          git commit -m "Update GitHub stats cards"
          git push
