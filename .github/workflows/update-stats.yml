name: Update GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download GitHub stats SVGs
        run: |
          curl -fL "https://github-readme-stats.vercel.app/api/top-langs/?username=acvb-Alexsander&layout=compact&theme=tokyonight&hide_border=true&langs_count=8" -o assets/top-langs.svg
          curl -fL "https://github-readme-stats.vercel.app/api?username=acvb-Alexsander&show_icons=true&theme=tokyonight&hide_border=true" -o assets/github-stats.svg

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "Update GitHub stats cards" || echo "No changes to commit"
          git push
