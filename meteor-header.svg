<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#10142b"/>
    </linearGradient>

    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#9ecbff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>

    <radialGradient id="head" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#bfe1ff"/>
      <stop offset="100%" stop-color="#6fa8ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="40" cy="30" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="80" r="1" ><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="40" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="20" r="1" ><animate attributeName="opacity" values="0.6;1;0.6" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="60" r="1.3"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="25" r="1" ><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="70" r="1.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="35" r="1" ><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="55" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="140" r="1" ><animate attributeName="opacity" values="0.5;1;0.5" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="120" r="1.2"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- meteoro: grupo que se move pela tela em loop -->
  <g filter="url(#glow)">
    <g>
      <!-- trilha -->
      <rect x="-70" y="-2.5" width="70" height="5" fill="url(#trail)" transform="rotate(35)"/>
      <!-- nucleo -->
      <circle r="6" fill="url(#head)"/>
      <animateTransform attributeName="transform" type="translate"
        values="-60,-60; 480,260; 1000,560"
        keyTimes="0;0.55;1"
        dur="6s"
        repeatCount="indefinite"/>
    </g>
  </g>

  <!-- impacto / flash -->
  <circle cx="480" cy="260" r="0" fill="#bfe1ff" opacity="0">
    <animate attributeName="r" values="0;0;90;0" keyTimes="0;0.53;0.6;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.55;0" keyTimes="0;0.53;0.6;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- dados revelados após o impacto -->
  <g font-family="Verdana, Geneva, sans-serif" fill="#e8edff" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.56;0.66;0.97;1" dur="6s" repeatCount="indefinite"/>

    <text x="450" y="120" text-anchor="middle" font-size="30" font-weight="bold" fill="#ffffff">
      Alexsander Vilas Boas
    </text>
    <text x="450" y="150" text-anchor="middle" font-size="15" fill="#9ecbff">
      Fullstack Developer • Angular · React · Java/Quarkus
    </text>
    <text x="450" y="175" text-anchor="middle" font-size="13" fill="#c7d2ff">
      Microservices &amp; REST APIs — Brasília, DF, Brasil
    </text>

    <text x="450" y="210" text-anchor="middle" font-size="12" fill="#8fa3ff">
      Angular · TypeScript · Java · Quarkus · React · Next.js · PostgreSQL · Azure
    </text>

    <text x="450" y="240" text-anchor="middle" font-size="12" fill="#9ecbff">
      📫 acvb.dev@gmail.com   |   🔗 linkedin.com/in/acvbdeveloper
    </text>
  </g>
</svg>
